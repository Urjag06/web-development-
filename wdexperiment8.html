<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>
<body>

    <h1>Student Information Table</h1>

    <table border="1" cellpadding="10">

        <!-- Table Heading -->
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Course</th>
        </tr>

        <!-- Table Row 1 -->
        <tr>
            <td>85</td>
            <td>Shreyash</td>
            <td>CSE</td>
        </tr>

        <!-- Table Row 2 -->
        <tr>
            <td>76</td>
            <td>Urja</td>
            <td>ECE</td>
        </tr>

        <!-- Table Row 3 -->
        <tr>
            <td>103</td>
            <td>Dipak</td>
            <td>MECH</td>
        </tr>

    </table>

</body>
</html>
